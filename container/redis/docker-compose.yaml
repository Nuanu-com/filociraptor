version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis-staging
    restart: unless-stopped

    ports:
      - "6379:6379"

    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy volatile-lru

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - staging-network

volumes:
  redis_data:

networks:
  staging-network:
    driver: bridge
